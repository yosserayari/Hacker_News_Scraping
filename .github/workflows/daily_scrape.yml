name: Daily Hacker News Update

on:
  schedule:
    - cron: '0 8 * * *' # Runs at 8:00 AM every day
  workflow_dispatch: # This adds a manual "Run" button

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas

      - name: Run Scraper
        run: python "import requests.py" 

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          git add scraped_news.csv
          git commit -m "Auto-update news data" || echo "No changes"
          git push
